<h1 id="%EC%BA%A0%ED%94%84-%EC%97%AC%EC%A0%95">캠프 여정</h1>

<h1 id="%EC%9A%B0%EB%A6%AC%EA%B0%80-%EB%A7%8C%EB%93%A0-%EA%B2%83%EB%93%A4">우리가 만든 것들</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="8" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EA%B9%80%ED%83%9C%EC%9C%A4-theo">김태윤 (Theo)</h1>
<blockquote>
<p>로켓런칭 리드 자동 분석 — &quot;리드 분석해줘&quot; 한 마디로 심사까지</p>
</blockquote>
<p><strong>해결하고 싶은 문제</strong></p>
<ul>
<li>신규 신청자 1명당 시트 → Notion 옮기기 + 적합도 판단에 <strong>30분~1시간</strong></li>
<li>신청자가 늘면 단순 반복 작업이 기하급수적으로 증가</li>
<li><strong>평가 기준이 담당자별로 달라</strong> 커뮤니케이션 비용 발생</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="9" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EA%B9%80%ED%83%9C%EC%9C%A4-theo--%EA%B8%B0%EC%A1%B4-%EB%B0%A9%EC%8B%9D%EC%9D%98-%EB%B3%91%EB%AA%A9">김태윤 (Theo) — 기존 방식의 병목</h1>
<table>
<thead>
<tr>
<th>병목</th>
<th>설명</th>
</tr>
</thead>
<tbody>
<tr>
<td>수동 데이터 이관</td>
<td>구글 시트 → Notion 복붙, 1명당 5~10분</td>
</tr>
<tr>
<td>기준 불일치</td>
<td>평가 기준이 머릿속에만 → 판단 일관성 부족</td>
</tr>
<tr>
<td>중복 처리 실수</td>
<td>이미 등록된 신청자를 다시 처리</td>
</tr>
<tr>
<td>확장 불가</td>
<td>신청자 증가 시 리소스 감당 어려움</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="10" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EA%B9%80%ED%83%9C%EC%9C%A4-theo--%EC%A7%80%ED%96%A5%ED%96%88%EB%8D%98-%EB%B0%A9%ED%96%A5%EC%84%B1">김태윤 (Theo) — 지향했던 방향성</h1>
<ul>
<li><code>리드 분석해줘</code> <strong>한 마디</strong>로 전체 프로세스 + 결과 도출까지 자동 진행</li>
<li>각자 머리에만 있는 평가 기준을 <strong>명문화</strong> → AI가 일관성 있게 적합도 제안</li>
<li>팀 피드백 → AI 평가 기준이 <strong>자동 개선</strong>되는 자기학습 구조</li>
</ul>
<blockquote>
<p>실은 시트에 신청자가 추가되면 알아서 프로세스가 돌아가는 <strong>완전 자동화</strong>를 원했음</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="11" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EA%B9%80%ED%83%9C%EC%9C%A4-theo--%ED%98%84%EC%9E%AC-%EA%B5%AC%ED%98%84-%EB%8B%A8%EA%B3%84">김태윤 (Theo) — 현재 구현 단계</h1>
<p><code>리드 분석해줘</code> 한 마디로 <strong>1차 심사 전체 파이프라인 실행</strong></p>
<ol>
<li>구글 시트에서 신청자 데이터 <strong>자동 수집</strong></li>
<li>Notion DB <strong>중복 체크</strong> → 신규 신청자만 분석</li>
<li>5개 항목(웨비나 적합도·SNS 브랜딩·성공사례·강사 온도·전환 준비도) <strong>100점 기준 AI 분석</strong></li>
<li>Notion 페이지 <strong>자동 생성</strong> (원문 + 분석 + 예상 질문 + 미팅 노트 템플릿)</li>
<li>Slack DM으로 <strong>분석 결과 요약 발송</strong></li>
<li>팀 판단 메모 → AI 불일치 패턴 분석 → <strong>평가 기준 자동 업데이트</strong></li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="12" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EA%B9%80%ED%83%9C%EC%9C%A4-theo--%EC%8B%9C%EC%97%B0">김태윤 (Theo) — 시연</h1>
<p><img src="theo_rocket_automation.gif" alt="" style="width:900px;" /></p>
<p><code>리드 분석해줘</code> → 수집 → 중복 체크 → AI 분석 → Notion 생성 → Slack 알림까지 <strong>자동 실행</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="13" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EA%B9%80%ED%83%9C%EC%9C%A4-theo--%EC%B6%94%ED%9B%84-%EA%B3%BC%EC%A0%9C">김태윤 (Theo) — 추후 과제</h1>
<ul>
<li><strong>자기학습 루프 실전 검증</strong> — 팀 피드백 → AI 기준 자동 업데이트 (아직 미경험)</li>
<li><strong>&quot;분석 등급 vs 실제 매출&quot; 상관관계 검증</strong> — 데이터가 쌓이면</li>
<li>신청자 증가 시 <strong>배치 처리 성능 최적화</strong></li>
<li>1차 서류 심사 → <strong>2차 필터링, 3차 온라인 미팅</strong>까지 동일 프로세스 확장</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="14" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EA%B9%80%ED%83%9C%EC%9C%A4-theo--%EB%B0%B0%EC%9A%B4-%EC%A0%90">김태윤 (Theo) — 배운 점</h1>
<ul>
<li>AI에 대한 <strong>막연한 두려움이 해소</strong>되었다 — 꾸준히 관심 갖고 물어보면 문제없다</li>
<li>현재 업무를 <strong>단계별로 해체하는 것</strong>이 자동화의 첫 단계 — 기준과 프로세스를 언어화·명문화</li>
<li>Slack·Notion 같은 <strong>실제 업무 도구와 연결</strong>하면서, 조언자 AI가 진짜 도구 AI가 되었다</li>
</ul>
<blockquote>
<p>&quot;내가 더 편해져서 만든 건데, 회사만 좋게 생겼네 에이&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="15" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%9D%B4%EB%B3%B4%EB%B0%B0-vivi">이보배 (Vivi)</h1>
<blockquote>
<p>폰스크리닝 자동화 — <code>/ps 홍길동</code> 한 줄이면 끝</p>
</blockquote>
<p><strong>문제</strong>: 후보자 1명당 일정 조율 → 메시지 발송 → 답변 대기 → 캘린더 → 인터뷰 기록지… <strong>30~40분</strong></p>
<p><strong>해결</strong>: Claude Code 스킬 <code>/ps</code>로 전체 플로우 자동화</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="16" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%9D%B4%EB%B3%B4%EB%B0%B0-vivi--ps-%EC%9B%8C%ED%81%AC%ED%94%8C%EB%A1%9C%EC%9A%B0">이보배 (Vivi) — /ps 워크플로우</h1>
<p><img src="vivi-workflow.png" alt="" style="width:1100px;" /></p>
<p><code>/ps 홍길동</code> 한 마디로 <strong>수집 → 일정 조율 → 발송 → 확정 → 기록지</strong> 전체 자동 실행</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-class="split" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" class="split" data-marpit-pagination="17" style="--paginate:true;--class:split;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%9D%B4%EB%B3%B4%EB%B0%B0-vivi--%EC%8B%A4%EC%A0%9C-%EB%8F%99%EC%9E%91-%ED%99%94%EB%A9%B4">이보배 (Vivi) — 실제 동작 화면</h1>
<p><img src="vivi-ps-demo.png" alt="" style="width:400px;" /></p>
<p><code>/ps</code> 한 줄로 생성된 <strong>실제 iMessage 대화</strong><br />
제안 → 수락 → 확정까지 자동 처리</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="18" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%9D%B4%EB%B3%B4%EB%B0%B0-vivi--%EC%97%B0%EB%8F%99-%EC%84%9C%EB%B9%84%EC%8A%A4-%EA%B5%AC%EC%A1%B0">이보배 (Vivi) — 연동 서비스 구조</h1>
<p><img src="vivi-services.png" alt="" style="width:500px;" /></p>
<p><strong>4개 외부 서비스를 비개발자가 직접 연결</strong> — OpenAPI · MCP · AppleScript + SQLite</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-class="ba-table" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" class="ba-table" data-marpit-pagination="19" style="--paginate:true;--class:ba-table;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%9D%B4%EB%B3%B4%EB%B0%B0-vivi--%EC%8B%A4%EC%82%AC%EC%9A%A9-%EA%B0%9C%EC%84%A0-%EC%82%AC%EB%A1%80">이보배 (Vivi) — 실사용 개선 사례</h1>
<table>
<thead>
<tr>
<th></th>
<th style="text-align:center">Before</th>
<th style="text-align:center">After</th>
</tr>
</thead>
<tbody>
<tr>
<td>퍼미션 승인</td>
<td style="text-align:center">매 단계 승인 버튼 <strong>10회</strong> 클릭</td>
<td style="text-align:center"><strong>에이전트 자율 실행</strong> — 이상 시에만 중단</td>
</tr>
<tr>
<td>메시지 발송</td>
<td style="text-align:center">iMessage 우선 → Android 실패 (3회 시도)</td>
<td style="text-align:center"><strong>SMS 우선 발송</strong> → 1회 시도로 성공</td>
</tr>
</tbody>
</table>
<blockquote>
<p>&quot;실제로 돌려보니 발견한 문제를, 직접 고쳤다.&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-class="ba-table" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" class="ba-table" data-marpit-pagination="20" style="--paginate:true;--class:ba-table;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%9D%B4%EB%B3%B4%EB%B0%B0-vivi--before--after">이보배 (Vivi) — Before / After</h1>
<table>
<thead>
<tr>
<th></th>
<th style="text-align:center">Before</th>
<th style="text-align:center">After</th>
</tr>
</thead>
<tbody>
<tr>
<td>1건당 전후 작업</td>
<td style="text-align:center">30~40분</td>
<td style="text-align:center"><strong>2~3분 (~93% 절감)</strong></td>
</tr>
<tr>
<td>4명 몰리는 날</td>
<td style="text-align:center">반나절</td>
<td style="text-align:center"><strong>10분 (~95% 절감)</strong></td>
</tr>
<tr>
<td>질문 퀄리티</td>
<td style="text-align:center">컨디션 따라 들쭉날쭉</td>
<td style="text-align:center"><strong>이력서+JD 기반 일관된 품질</strong></td>
</tr>
</tbody>
</table>
<p><strong>연동 서비스</strong>: 그리팅 ATS · Google Calendar · Apple Messages · Notion</p>
<blockquote>
<p>&quot;비개발자가 4개 서비스를 연결하고, 후보자 통화 제외한 폰스크리닝 전후 업무의 93%를 자동화했다.&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="21" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%9D%B4%EB%B3%B4%EB%B0%B0-vivi--%EB%8B%A4%EC%9D%8C-%EB%AA%A9%ED%91%9C-%EC%B1%84%EC%9A%A9-%ED%92%80%ED%8D%BC%EB%84%90-%EC%9E%90%EB%8F%99%ED%99%94">이보배 (Vivi) — 다음 목표: 채용 풀퍼널 자동화</h1>
<p><strong>폰스크리닝은 시작일 뿐 — 채용 전 과정을 자동화해 나갈 계획</strong></p>
<table>
<thead>
<tr>
<th>과제</th>
<th>설명</th>
<th style="text-align:center">상태</th>
</tr>
</thead>
<tbody>
<tr>
<td>채용 브랜딩 에이전트</td>
<td>회사·팀 소개 콘텐츠 자동 생성</td>
<td style="text-align:center">예정</td>
</tr>
<tr>
<td>다이렉트 소싱</td>
<td>링크드인·원티드 등 후보자 제안 발송 자동화</td>
<td style="text-align:center">예정</td>
</tr>
<tr>
<td>대면 인터뷰 어레인지</td>
<td>면접관 + 후보자 일정 조율 → 캘린더·회의실·안내</td>
<td style="text-align:center"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> <code>/arrange</code> 구현 완료</td>
</tr>
<tr>
<td>다중 후보자 일괄 처리</td>
<td>동시에 여러 명에게 제안 메시지 발송</td>
<td style="text-align:center">예정</td>
</tr>
</tbody>
</table>
<p>후보자 통화는 자동화하지 않는다 — <strong>AI면접관 도입 계획 (아직) 없음</strong></p>
<blockquote>
<p>&quot;자동화의 목적은 모든 것을 자동화하는 게 아니라, 사람이 해야 할 일에 집중할 수 있도록 나머지를 덜어주는 것&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="22" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%B5%9C%EC%9E%AC%ED%9B%88-terry">최재훈 (Terry)</h1>
<blockquote>
<p>CX 어시스턴트 — 상담 스크린샷 하나로 분류·검색·응대까지</p>
</blockquote>
<p><strong>문제</strong>: 채널톡 문의마다 VoC 시트·Notion·Slack을 <strong>각각 수동 탐색</strong><br />
신규 입사자일수록 맥락 파악에 시간이 걸려 응답이 느려짐</p>
<p><strong>해결</strong>: 채널톡 상담 스크린샷을 첨부하면 4단계 자동 처리</p>
<table>
<thead>
<tr>
<th style="text-align:center">단계</th>
<th>내용</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center">1. 분류</td>
<td>문의 주체·트랙·결제수단·귀책 자동 태깅</td>
</tr>
<tr>
<td style="text-align:center">2. 통합 검색</td>
<td>VoC 시트 + Notion + Slack 유사 케이스 (링크 포함)</td>
</tr>
<tr>
<td style="text-align:center">3. 응대 초안</td>
<td>복붙 → 수정만 하면 되는 메시지 생성</td>
</tr>
<tr>
<td style="text-align:center">4. 에스컬레이션</td>
<td>리드 문의 vs 개발팀 문의 기준 자동 판단</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="23" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%B5%9C%EC%9E%AC%ED%9B%88-terry--%ED%95%B5%EC%8B%AC-%EA%B0%80%EC%B9%98">최재훈 (Terry) — 핵심 가치</h1>
<p><strong>경험에 의존하던 암묵지를 시스템으로</strong></p>
<ul>
<li>내부 가이드에 명시되지 않은 문의의 경우, 응대 기준이 개인 기억과 주관에 의존<br />
→ <strong>SKILL.md에 명문화</strong></li>
<li>유사 케이스 검색을 사람 기억이 아닌 <strong>3개 소스 자동 통합 탐색</strong>으로</li>
<li>신규 CX 매니저도 온보딩 시 이 스킬로 <strong>동일한 품질 대응 가능</strong></li>
</ul>
<blockquote>
<p>&quot;누구든 동일한 품질로, 빠르게 대응할 수 있는 구조&quot;</p>
</blockquote>
</section>

<h1 id="%EC%B5%9C%EC%9E%AC%ED%9B%88-terry--%EC%B6%94%ED%9B%84-%EB%AA%A9%ED%91%9C">최재훈 (Terry) — 추후 목표</h1>
<h2 id="1-%EA%B2%80%EC%83%89-%EC%86%8D%EB%8F%84-%EC%B5%9C%EC%A0%81%ED%99%94">1: 검색 속도 최적화</h2>
<p><strong>처리 완료 케이스를 메모리에 패턴화</strong></p>
<ul>
<li>유사 문의 시 저장된 케이스 <strong>우선 검색</strong> → 응답 속도 향상</li>
</ul>
<p><strong>VoC 대시보드 시트 검색 최적화</strong></p>
<ul>
<li>현재: 불필요한 열까지 전체 조회 → 토큰 초과</li>
<li>단기: 태그+요약 열만 <strong>범위 지정 조회</strong> → 속도·토큰 대폭 절감</li>
<li>중기: 별도 인덱스 시트(키워드-행번호 매핑) → 전체 스캔 없이 직접 접근</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="28" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%B5%9C%EC%9E%AC%ED%9B%88-terry--%EC%B6%94%ED%9B%84-%EB%AA%A9%ED%91%9C-1">최재훈 (Terry) — 추후 목표</h1>
<h2 id="2-cx-%EB%8C%80%EC%9D%91-%EA%B8%B0%EC%A4%80-%EC%9E%90%EB%8F%99-%EC%97%85%EB%8D%B0%EC%9D%B4%ED%8A%B8">2: CX 대응 기준 자동 업데이트</h2>
<p><strong>제품 릴리즈·이슈를 CX가 자동으로 파악</strong></p>
<ul>
<li>Slack 제품팀 채널을 <strong>정기 스캔</strong> → 이슈 요약</li>
<li><strong>&quot;이번 주 CX 유의사항&quot;</strong> 형태로 자동 문서화</li>
<li>한계: CX 관련 이슈인지 필터링이 LLM 판단에 의존 → 초기에는 수시 확인 필요</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-class="split" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" class="split" data-marpit-pagination="29" style="--paginate:true;--class:split;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">

<h1 id="%EC%B5%9C%EC%9E%AC%ED%9B%88-terry--%EC%86%8C%EA%B0%90">최재훈 (Terry) — 소감</h1>
<blockquote>
<p>&quot;내 '존재'가 조직의 '병목'이라는 의식,<br />
그 의식에서 벗어나고자 했던 '집착'이 저만의 동력이었습니다.&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="33" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%9D%B4%EC%83%88%EB%B4%84-bom">이새봄 (Bom)</h1>
<blockquote>
<p>디자인 시스템 자동화 시도기 — &quot;작고 실제로 작동하는 것&quot;</p>
</blockquote>
<p><strong>처음 구상</strong>: Figma 변경 → 토큰 자동 추출 → FE 전달 → Slack 알림까지 한 흐름</p>
<p><strong>부딪힌 현실</strong>:</p>
<ul>
<li>Figma API 접근 불가 (요금제 제약)</li>
<li>FE 단 자동화는 이미 FE팀이 진행 중</li>
</ul>
<p>→ 범위를 계속 좁혀서 <strong>내가 통제 가능한 가장 작은 지점</strong>을 찾기로</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="34" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%9D%B4%EC%83%88%EB%B4%84-bom--%EA%B5%AC%ED%98%84%EA%B3%BC-%EB%B0%B0%EC%9A%B4-%EC%A0%90">이새봄 (Bom) — 구현과 배운 점</h1>
<p><strong>구현</strong>: Notion DB 버튼 클릭 → Slack <code>#fepd-collab</code>에 FE 멘션 + 문서 링크 자동 발송</p>
<p>직접 코드를 짠 것도, API를 연결한 것도 아니다.<br />
Claude Code에 물었더니 <strong>Notion Automations 기능을 알려줬다.</strong><br />
몰라서 못 쓰고 있던 기능 — 실제로 작동하고, 실무에서 쓰이고 있다.</p>
<p><strong>보너스</strong>: 디자인 토큰 리부트 시 Claude Code로 <strong>네이밍 일괄 변환 스크립트</strong> 활용</p>
<blockquote>
<p>&quot;자동화의 첫 단계는 코드가 아니라, 내 업무를 들여다보는 것이었다.&quot;</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="35" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%86%A1%EC%83%81%EC%88%98-eddie">송상수 (Eddie)</h1>
<blockquote>
<p>강의 링크 하나로 리드마그넷 + 워크북 PDF 자동 생성</p>
</blockquote>
<p><strong>문제</strong>: 영상 강의의 핵심을 빠르게 학습하고 실천으로 연결하고 싶은데, 자막 추출 → 요약 → 재구조화까지 <strong>5단계 수작업</strong></p>
<p><strong>해결</strong>: <code>/product_create</code> 커맨드 하나로 스크래핑 → 요약 → 워크북 + 리드마그넷 PDF 원스톱 생성</p>
<p><strong>결과</strong>: 고객사 강의 링크만 입력하면 <strong>상용화 수준의 PDF 3종</strong> 자동 생성</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="36" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%86%A1%EC%83%81%EC%88%98-eddie--%EA%B3%A0%EA%B0%9D%EC%82%AC-%EC%A0%81%EC%9A%A9-%EC%8B%9C%EB%82%98%EB%A6%AC%EC%98%A4">송상수 (Eddie) — 고객사 적용 시나리오</h1>
<p><strong>라클 고객사에게 제공하는 가치</strong></p>
<table>
<thead>
<tr>
<th>산출물</th>
<th>용도</th>
</tr>
</thead>
<tbody>
<tr>
<td>요약본 PDF</td>
<td>강의 핵심 내용 빠른 학습</td>
</tr>
<tr>
<td>실전 워크북 PDF</td>
<td>강의 기반 실천 가이드</td>
</tr>
<tr>
<td>리드마그넷 PDF</td>
<td>잠재고객 유입용 무료 콘텐츠</td>
</tr>
</tbody>
</table>
<blockquote>
<p>&quot;내 강의를 선택하기만 하면, 리드마그넷이랑 워크북이 자동으로 나와요&quot;</p>
</blockquote>
<p>핵심은 엔진 구현보다 <strong>프롬프트 반복 개선으로 상용화 수준 퀄리티 확보</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="37" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EC%B5%9C%EC%A7%80%EC%98%81-arin">최지영 (Arin)</h1>
<blockquote>
<p>디자인 요청 취합 에이전트 — Slack·Notion에 흩어진 요청, AI가 알아서 모아준다</p>
</blockquote>
<p><strong>문제</strong>: Slack 2개 채널 + 개인 DM + Notion 등 4개 채널에서 들어오는 디자인 요청을 수동 취합 &amp; 정리에 약 <strong>30분가량</strong> 소요</p>
<table>
<thead>
<tr>
<th>병목</th>
<th>설명</th>
</tr>
</thead>
<tbody>
<tr>
<td>요청 경로 파편화</td>
<td>4개 채널에서 각각 수동 확인</td>
</tr>
<tr>
<td>요청 형식의 다양성</td>
<td>요청자마다 형식이 달라 재확인 필요</td>
</tr>
<tr>
<td>수동 복제 관리</td>
<td>전주 Task → 차주 Task 수동 복제·수정</td>
</tr>
<tr>
<td>정보 누락</td>
<td>Figma·기획안·클래스 링크 등 빠짐</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-class="split" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" class="split" data-marpit-pagination="38" style="--paginate:true;--class:split;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="step-1--%EC%88%98%EC%A7%911">Step 1 — 수집1</h1>
<p><img src="%EC%88%98%EC%A7%911.png" alt="" style="width:500px;" /></p>
<p><strong>Slack 2채널 + DM을 1시간마다 자동 스캔</strong><br />
월~금 9시~19시, 정각마다 디자인 관련 메시지 수집</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-class="split" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" class="split" data-marpit-pagination="39" style="--paginate:true;--class:split;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="step-1--%EC%88%98%EC%A7%912">Step 1 — 수집2</h1>
<p><img src="%EC%88%98%EC%A7%912.png" alt="" style="width:400px;" /></p>
<p>Notion 액션 플랜의 <strong>디자인 요청도 함께 수집</strong><br />
Slack + Notion, 흩어진 요청을 한 곳으로</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-class="split" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" class="split" data-marpit-pagination="40" style="--paginate:true;--class:split;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="step-2--human-review">Step 2 — Human Review</h1>
<p><img src="human-review.jpg" alt="" style="width:360px;" /></p>
<p>수집된 후 필터링된 요청을 <strong>Slack DM으로 Arin에게 전송</strong><br />
확인 후 승인 — 1시간 무응답 시 자동 승인</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-class="split" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" class="split" data-marpit-pagination="41" style="--paginate:true;--class:split;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="step-3--figma-%ED%8E%98%EC%9D%B4%EC%A7%80-%EC%9E%90%EB%8F%99-%EC%83%9D%EC%84%B1">Step 3 — Figma 페이지 자동 생성</h1>
<p><img src="figma-plugin.gif" alt="" style="width:560px;" /></p>
<p>신규 Task → <strong>Figma 플러그인 버튼 한 번</strong>으로<br />

<h1 id="%EA%B9%80%EC%84%B1%EC%9B%90-ethan--%EC%9E%90%EB%8F%99%ED%99%94%EC%9D%98-%ED%8C%90%EB%8B%A8-%EC%9B%90%EC%B9%99">김성원 (Ethan) — 자동화의 판단 원칙</h1>
<blockquote>
<p>&quot;문서(원본)가 가장 정확하다&quot; — API 데이터와 사업자등록증이 다를 때, 항상 원본 문서를 기준으로 판단한다.</p>
</blockquote>
<table>
<thead>
<tr>
<th style="text-align:center">상황 (Before)</th>
<th style="text-align:center">개선 (After)</th>
<th style="text-align:center">절감률</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center">주민등록증 처리 시도 → 오류</td>
<td style="text-align:center"><strong>자동 SKIP</strong></td>
<td style="text-align:center">—</td>
</tr>
<tr>
<td style="text-align:center">PDF 전체 스캔</td>
<td style="text-align:center"><strong>1페이지만 확인</strong></td>
<td style="text-align:center">~80%</td>
</tr>
<tr>
<td style="text-align:center">구분자 불일치 (디지털로 10길 vs 디지털로10길)</td>
<td style="text-align:center"><strong>정규화 로직으로 자동 통일</strong></td>
<td style="text-align:center">~97%</td>
</tr>
<tr>
<td style="text-align:center">API 오타 그대로 반영</td>
<td style="text-align:center"><strong>원본 문서 기준 판단</strong></td>
<td style="text-align:center">—</td>
</tr>
</tbody>
</table>
<p><strong>연동 서비스</strong>: LiveKlass API · Claude 멀티모달 · Google Sheets API · Python</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-theme="l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l" lang="ko-KR" data-marpit-pagination="59" style="--paginate:true;--theme:l2xfhre6xv3sjmzajivjkf0f1iuif9h54opzot0na7l;" data-marpit-pagination-total="65" data-size="16:9">
<h1 id="%EA%B9%80%EC%84%B1%EC%9B%90-ethan--%EC%B6%94%ED%9B%84-%EA%B3%BC%EC%A0%9C">김성원 (Ethan) — 추후 과제</h1>

<th>설명</th>
</tr>
</thead>
<tbody>
